name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          echo "registry=https://usw1.packages.broadcom.com/artifactory/api/npm/twoe-npm-virtual/" > .npmrc
          echo "//usw1.packages.broadcom.com/artifactory/api/npm/twoe-npm-virtual/:_authToken=${{ secrets.NPM_AUTH_TOKEN }}" >> .npmrc
          echo "always-auth=true" >> .npmrc
          echo "strict-ssl=false" >> .npmrc
          npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm run test:e2e

  build:
    name: Create Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare build files
        run: |
          mkdir -p dist
          cp InvoiceApprovalTable.html InvoiceApprovalTable.css InvoiceApprovalTable.js dist/ 2>/dev/null || true

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-build
          path: dist/
